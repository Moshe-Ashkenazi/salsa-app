<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>סלסה — זמינות</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:         #0C0C10;
            --surface:    #13131A;
            --surface2:   #1C1C27;
            --border:     rgba(255,255,255,0.06);
            --accent:     #FF3D6B;
            --gold:       #F5C542;
            --green:      #00D67D;
            --red:        #FF3D6B;
            --pending:    #8D8D9B;
            --amber:      #FF9F45;
            --text:       #EEEAE4;
            --muted:      #585669;
            --muted2:     #252535;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            padding-bottom: 64px;
            overflow-x: hidden;
        }

        /* ── HEADER ──────────────────────────────────────── */
        .header {
            padding: 44px 20px 24px;
            text-align: center;
            position: relative;
        }
        .header-glow {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse 70% 55% at 50% 0%, rgba(255,61,107,0.16) 0%, transparent 70%);
            pointer-events: none;
        }
        .header-tag {
            font-size: 10px; font-weight: 600;
            letter-spacing: 5px; text-transform: uppercase;
            color: var(--accent); margin-bottom: 8px;
        }
        .header-title {
            font-family: 'Playfair Display', serif;
            font-style: italic; font-size: 50px; font-weight: 900; line-height: 1;
            background: linear-gradient(135deg, #EEEAE4 0%, rgba(238,234,228,0.65) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .header-title em { -webkit-text-fill-color: var(--accent); }
        .header-sub { margin-top: 8px; font-size: 13px; color: var(--muted); font-weight: 400; }
        .team-link {
            display: inline-flex; align-items: center; justify-content: center;
            margin-top: 14px; text-decoration: none;
            border: 1px solid rgba(245,197,66,0.22);
            background: rgba(245,197,66,0.07);
            color: var(--gold); font-size: 12px; font-weight: 700;
            padding: 9px 16px; border-radius: 100px;
        }

        /* ── MONTH NAV ───────────────────────────────────── */
        .month-nav {
            display: flex; align-items: center;
            justify-content: center; gap: 12px; margin-top: 18px;
        }
        .nav-btn {
            width: 40px; height: 40px; border-radius: 13px;
            border: 1px solid var(--border); background: var(--surface);
            color: var(--muted); display: flex; align-items: center;
            justify-content: center; cursor: pointer;
            transition: all 0.18s ease; font-size: 18px; line-height: 1;
        }
        .nav-btn:active { transform: scale(0.88); }
        .nav-btn:hover  { border-color: rgba(255,255,255,0.13); color: var(--text); }
        .nav-btn:disabled { opacity: 0.25; pointer-events: none; }

        .month-chip {
            display: inline-flex; align-items: center; gap: 7px;
            border: 1px solid rgba(245,197,66,0.2);
            background: rgba(245,197,66,0.07);
            color: var(--gold); font-size: 13px; font-weight: 600;
            padding: 9px 20px; border-radius: 100px;
            min-width: 150px; justify-content: center;
            letter-spacing: 0.2px; transition: all 0.22s;
        }
        .month-chip.archive {
            border-color: rgba(255,159,69,0.22);
            background: rgba(255,159,69,0.07);
            color: var(--amber);
        }

        .archive-badge {
            display: none; align-items: center; justify-content: center;
            gap: 5px; background: rgba(255,159,69,0.08);
            border: 1px solid rgba(255,159,69,0.2);
            color: var(--amber); font-size: 11px; font-weight: 600;
            padding: 5px 14px; border-radius: 100px;
            margin: 10px auto 0; width: fit-content; letter-spacing: 0.5px;
        }
        .archive-badge.show { display: flex; }

        /* ── CONTENT ─────────────────────────────────────── */
        .content { padding: 20px 16px 0; }

        .section-label {
            font-size: 10px; font-weight: 600;
            letter-spacing: 3.5px; text-transform: uppercase;
            color: var(--muted); margin-bottom: 11px;
        }

        /* ── NAME PILLS ──────────────────────────────────── */
        .name-pills {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
        }
        .name-pill {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--muted); padding: 9px 18px; border-radius: 100px;
            font-size: 14px; font-weight: 500; cursor: pointer;
            transition: all 0.2s; font-family: 'Sora', sans-serif;
        }
        .name-pill:active { transform: scale(0.93); }
        .name-pill.selected {
            background: var(--accent); border-color: var(--accent);
            color: #fff; font-weight: 600;
            box-shadow: 0 0 20px rgba(255,61,107,0.28);
        }

        /* ── DATE CARDS ──────────────────────────────────── */
        .date-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 22px; padding: 20px;
            margin-bottom: 12px; position: relative;
            overflow: hidden; opacity: 0; transform: translateY(14px);
            animation: cardIn 0.38s ease forwards;
        }
        @keyframes cardIn { to { opacity:1; transform:translateY(0); } }
        .date-card:nth-child(1){animation-delay:.04s}
        .date-card:nth-child(2){animation-delay:.09s}
        .date-card:nth-child(3){animation-delay:.14s}
        .date-card:nth-child(4){animation-delay:.19s}
        .date-card:nth-child(5){animation-delay:.24s}

        .date-card::before {
            content:''; position:absolute;
            top:20px; bottom:20px; right:0;
            width:3px; border-radius:2px 0 0 2px;
            background:linear-gradient(180deg,var(--accent) 0%,transparent 100%);
            opacity:0; transition:opacity .3s;
        }
        .date-card.has-my-status::before { opacity:1; }

        .card-top {
            display:flex; align-items:flex-start;
            justify-content:space-between; margin-bottom:16px;
        }
        .date-day-tag {
            font-size:9px; font-weight:600;
            letter-spacing:4px; text-transform:uppercase;
            color:var(--accent); margin-bottom:3px;
        }
        .date-day-num {
            font-family:'Playfair Display',serif;
            font-size:30px; font-weight:700; line-height:1;
        }
        .date-month-name { font-size:12px; color:var(--muted); margin-top:3px; }

        /* Action buttons */
        .action-btns { display:flex; gap:9px; }
        .action-btns.locked { opacity:0.2; pointer-events:none; }
        .btn-avail {
            width:52px; height:52px; border-radius:16px; border:1.5px solid;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:all .18s; background:transparent; font-size:20px;
        }
        .btn-avail:active { transform:scale(0.88); }
        .btn-yes {
            border-color:rgba(0,214,125,0.25); color:var(--green);
            background:rgba(0,214,125,0.07);
        }
        .btn-yes.active {
            background:var(--green); border-color:var(--green);
            color:#fff; box-shadow:0 0 18px rgba(0,214,125,0.35);
        }
        .btn-no {
            border-color:rgba(255,61,107,0.25); color:var(--accent);
            background:rgba(255,61,107,0.07);
        }
        .btn-no.active {
            background:var(--accent); border-color:var(--accent);
            color:#fff; box-shadow:0 0 18px rgba(255,61,107,0.35);
        }

        .archive-label {
            font-size:11px; color:var(--amber);
            padding-top:12px; font-weight:500;
        }

        .card-divider { height:1px; background:var(--border); margin:0 0 14px; }

        /* ── INSTRUCTOR GRID ─────────────────────────────── */
        .inst-grid {
            display:grid; grid-template-columns:repeat(6,1fr);
            gap:5px; margin-bottom:14px;
        }
        .inst-slot {
            display:flex; flex-direction:column;
            align-items:center; gap:5px;
        }
        .inst-avatar {
            width:38px; height:38px; border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            font-size:13px; font-weight:700;
            border:1.5px solid transparent;
            transition:all .25s ease;
        }
        .inst-label {
            font-size:9px; color:var(--muted);
            font-weight:500; text-align:center; transition:color .2s;
        }

        /* PENDING */
        .inst-avatar.s-pending {
            background:rgba(141,141,155,0.13);
            border-color:rgba(141,141,155,0.55);
            border-style:solid;
            color:var(--pending);
            opacity:0.9;
        }
        .inst-slot.s-pending .inst-label { color:var(--pending); font-weight:600; }

        /* AVAILABLE */
        .inst-avatar.s-available {
            border-style:solid;
            border-color:var(--green);
            background:rgba(0,214,125,0.24);
            color:var(--green);
            box-shadow:0 0 14px rgba(0,214,125,0.2);
        }
        .inst-slot.s-available .inst-label { color:var(--green); font-weight:600; }

        /* UNAVAILABLE */
        .inst-avatar.s-unavailable {
            border-style:solid;
            border-color:var(--red);
            background:rgba(255,61,107,0.18);
            color:#FF6F8C;
            opacity:1;
            box-shadow:0 0 12px rgba(255,61,107,0.12);
        }
        .inst-slot.s-unavailable .inst-label { color:#FF6F8C; font-weight:600; }

        /* "Me" ring */
        .inst-avatar.is-me {
            outline:2px solid white;
            outline-offset:2px;
            transform:scale(1.1);
        }
        .inst-avatar.s-available.is-me   { box-shadow:0 0 14px rgba(0,214,125,0.45); }
        .inst-avatar.s-unavailable.is-me { box-shadow:0 0 14px rgba(255,61,107,0.32); }
        .inst-avatar.s-pending.is-me     { border-color:rgba(255,255,255,0.8); }

        /* ── SUMMARY BAR ─────────────────────────────────── */
        .summary-bar {
            display:flex; align-items:center; gap:6px;
            padding:9px 14px; background:var(--surface2);
            border-radius:12px;
        }
        .sum-item {
            display:flex; align-items:center; gap:5px;
            font-size:12px; font-weight:600; flex:1; justify-content:center;
        }
        .sum-dot { width:7px; height:7px; border-radius:50%; }
        .sum-dot.green { background:var(--green); }
        .sum-dot.red   { background:var(--red); }
        .sum-dot.amber { background:var(--pending); }
        .sum-item.green { color:var(--green); }
        .sum-item.red   { color:#FF6F8C; }
        .sum-item.amber { color:var(--pending); }
        .sum-sep { color:var(--muted2); font-size:18px; line-height:1; }

        /* ── TOAST ───────────────────────────────────────── */
        .toast {
            position:fixed; bottom:24px; left:50%;
            transform:translateX(-50%) translateY(90px);
            max-width:calc(100vw - 40px); white-space:nowrap;
            background:var(--surface2); border:1px solid var(--border);
            color:var(--text); padding:13px 22px; border-radius:18px;
            font-size:13px; font-weight:600;
            box-shadow:0 16px 48px rgba(0,0,0,0.6);
            transition:transform .35s cubic-bezier(0.34,1.56,0.64,1);
            z-index:999; text-align:center;
        }
        .toast.show { transform:translateX(-50%) translateY(0); }
        .toast.ok   { border-color:rgba(0,214,125,0.4); }
        .toast.err  { border-color:rgba(255,61,107,0.4); }

        .spinner {
            width:18px; height:18px;
            border:2px solid rgba(255,255,255,0.2);
            border-top-color:#fff; border-radius:50%;
            animation:spin .7s linear infinite;
        }
        @keyframes spin { to{transform:rotate(360deg)} }

        .empty-msg {
            text-align:center; color:var(--muted);
            font-size:14px; padding:32px 0;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-glow"></div>
    <div class="header-tag">Studio Schedule</div>
    <div class="header-title"><em>Salsa</em></div>
    <div class="header-sub">זמינות מדריכים — ימי חמישי</div>
    <a class="team-link" href="team.html">לוח השיבוץ שלי</a>

    <div class="month-nav">
        <button class="nav-btn" id="prevBtn" onclick="shiftMonth(-1)">&#8592;</button>
        <div class="month-chip" id="monthChip">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="3"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span id="monthLabel">טוען...</span>
        </div>
        <button class="nav-btn" id="nextBtn" onclick="shiftMonth(1)">&#8594;</button>
    </div>

    <div class="archive-badge" id="archiveBadge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="21 8 21 21 3 21 3 8"/>
            <rect x="1" y="3" width="22" height="5"/>
            <line x1="10" y1="12" x2="14" y2="12"/>
        </svg>
        מצב ארכיון — צפייה בלבד
    </div>
</div>

<div class="content">
    <div class="section-label">מי אתה?</div>
    <div class="name-pills" id="namePills"></div>
    <div class="section-label">ימי חמישי</div>
    <div id="datesContainer"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import {
        getFirestore, collection, query,
        where, onSnapshot, doc, getDoc, getDocs, setDoc
    } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const app = initializeApp({
        apiKey: "AIzaSyARhQHRZEaWN-0NyMbWQo416hDaE8uCUOM",
        authDomain: "salsaproject-aadfe.firebaseapp.com",
        projectId: "salsaproject-aadfe",
        storageBucket: "salsaproject-aadfe.firebasestorage.app",
        messagingSenderId: "357758186496",
        appId: "1:357758186496:web:dcb34b95470a68a16654e5"
    });
    const db = getFirestore(app);

    let INSTRUCTORS = [];
    const COLORS = {
        'משה':'#FF6B6B','רובי':'#C084FC',
        'גפן':'#34D399', 'נטע':'#FBBF24',
        'ניב':'#60A5FA', 'עדי':'#F472B6'
    };
    const HEB_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני',
                        'יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

    let selectedName = null;
    let data         = {};
    let unsubscribe  = null;

    // ── Logic: Max Allowed Month ─────────────────────────────
    // If today is < 28th, max visible month is CURRENT month.
    // If today is >= 28th, max visible month is NEXT month.
    function calcMaxMonth() {
        const t = new Date();
        let yr = t.getFullYear(), mo = t.getMonth();
        if (t.getDate() >= 28) { mo++; if (mo>11){mo=0;yr++;} }
        return { year:yr, month:mo };
    }
    
    // The "Active" month is always the MAX allowed month.
    const MAX_ALLOWED = calcMaxMonth();
    let view = { ...MAX_ALLOWED };

    // ── Helpers ──────────────────────────────────────────────
    const fmtKey = d => {
        const dd = String(d.getDate()).padStart(2, '0');
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const yy = String(d.getFullYear()).slice(-2);
        return `${dd}/${mm}/${yy}`;
    };

    function getThursdays(yr, mo) {
        const out=[], cur=new Date(yr,mo,1), last=new Date(yr,mo+1,0);
        while(cur.getDay()!==4) cur.setDate(cur.getDate()+1);
        while(cur<=last){ out.push(new Date(cur)); cur.setDate(cur.getDate()+7); }
        return out;
    }

    const isActive = vm => vm.year===MAX_ALLOWED.year && vm.month===MAX_ALLOWED.month;

    function toast(msg,type='ok'){
        const el=document.getElementById('toast');
        el.textContent=msg; el.className=`toast ${type} show`;
        setTimeout(()=>el.className='toast',3000);
    }

    // ── Month navigation ──────────────────────────────────────
    window.shiftMonth = dir => {
        let {year,month}=view;
        month+=dir;
        if(month<0){month=11;year--;}
        if(month>11){month=0;year++;}
        view={year,month};
        renderView();
    };

    function renderView(){
        const {year,month}=view;
        document.getElementById('monthLabel').textContent=`${HEB_MONTHS[month]} ${year}`;

        const active=isActive(view);
        document.getElementById('monthChip').className=active?'month-chip':'month-chip archive';
        document.getElementById('archiveBadge').className=active?'archive-badge':'archive-badge show';

        // Disable 'Next' button if we are at the MAX allowed month
        const isMaxMonth = (year === MAX_ALLOWED.year && month === MAX_ALLOWED.month);
        document.getElementById('nextBtn').disabled = isMaxMonth;

        const thursdays=getThursdays(year,month);
        data={}; thursdays.forEach(d=>{data[fmtKey(d)]={};});
        renderCards(thursdays,active);
        subscribeToMonth(thursdays.map(fmtKey));
    }

    // ── Firestore ─────────────────────────────────────────────
    function subscribeToMonth(keys){
        if(unsubscribe){unsubscribe();unsubscribe=null;}
        if(!keys.length) return;
        const q=query(collection(db,'availability'),where('date','in',keys));
        unsubscribe=onSnapshot(q,snap=>{
            keys.forEach(k=>{data[k]={};});
            snap.forEach(d=>{
                const{name,date,status}=d.data();
                if(data[date]) data[date][name]=status;
            });
            refreshAll(keys);
        },err=>console.error(err));
    }

    // ── Pills ─────────────────────────────────────────────────
    function renderPills(){
        const wrap=document.getElementById('namePills');
        wrap.innerHTML = '';
        if (!INSTRUCTORS.length) {
            wrap.innerHTML = '<div class="empty-msg">אין מדריכים פעילים כרגע. יש להוסיף מדריכים במסך הניהול.</div>';
            return;
        }
        INSTRUCTORS.forEach(name=>{
            const btn=document.createElement('button');
            btn.className='name-pill'; btn.textContent=name; btn.id=`pill-${name}`;
            btn.onclick=()=>pickName(name); wrap.appendChild(btn);
        });
    }

    function pickName(name){
        selectedName=name;
        document.querySelectorAll('.name-pill').forEach(p=>p.classList.remove('selected'));
        document.getElementById(`pill-${name}`).classList.add('selected');
        refreshAll(Object.keys(data));
    }

    async function loadInstructors() {
        try {
            const snap = await getDocs(query(collection(db, 'instructors'), where('active', '==', true)));
            const active = snap.docs
                .map(docSnap => docSnap.data())
                .filter(item => item.name)
                .sort((a, b) => String(a.name).localeCompare(String(b.name), 'he'))
                .map(item => item.name);

            INSTRUCTORS = active;
        } catch (err) {
            console.error(err);
            INSTRUCTORS = [];
        }
    }

    // ── Cards ─────────────────────────────────────────────────
    function renderCards(thursdays, activeMonth){
        const wrap=document.getElementById('datesContainer');
        wrap.innerHTML='';
        if(!thursdays.length){
            wrap.innerHTML='<div class="empty-msg">אין ימי חמישי בחודש זה</div>';
            return;
        }
        thursdays.forEach(date=>{
            const key=fmtKey(date);
            const card=document.createElement('div');
            card.className='date-card'; card.id=`card-${key}`;

            const topRight = activeMonth
                ? `<div class="action-btns locked" id="btns-${key}">
                       <button class="btn-avail btn-yes" id="yes-${key}" onclick="window._mark('${key}','available',this)">✓</button>
                       <button class="btn-avail btn-no"  id="no-${key}"  onclick="window._mark('${key}','unavailable',this)">✕</button>
                   </div>`
                : `<div class="archive-label">ארכיון</div>`;

            card.innerHTML=`
                <div class="card-top">
                    <div>
                        <div class="date-day-tag">יום חמישי</div>
                        <div class="date-day-num">${date.getDate()}</div>
                        <div class="date-month-name">${HEB_MONTHS[date.getMonth()]}</div>
                    </div>
                    ${topRight}
                </div>
                <div class="card-divider"></div>
                <div class="inst-grid">
                    ${INSTRUCTORS.map(n=>`
                        <div class="inst-slot s-pending" id="slot-${key}-${n}">
                            <div class="inst-avatar s-pending" id="av-${key}-${n}">${n.charAt(0)}</div>
                            <div class="inst-label">${n}</div>
                        </div>`).join('')}
                </div>
                <div class="summary-bar">
                    <div class="sum-item green"><div class="sum-dot green"></div><span id="sg-${key}">0</span> פנויים</div>
                    <div class="sum-sep">·</div>
                    <div class="sum-item red"><div class="sum-dot red"></div><span id="sr-${key}">0</span> לא</div>
                    <div class="sum-sep">·</div>
                    <div class="sum-item amber"><div class="sum-dot amber"></div><span id="sa-${key}">${INSTRUCTORS.length} טרם ענו</span></div>
                </div>`;

            wrap.appendChild(card);
        });
    }

    function refreshAll(keys){
        keys.forEach(key=>{
            refreshAvatars(key);
            refreshButtons(key);
            refreshSummary(key);
        });
    }

    function refreshAvatars(key){
        INSTRUCTORS.forEach(name=>{
            const av=document.getElementById(`av-${key}-${name}`);
            const slot=document.getElementById(`slot-${key}-${name}`);
            if(!av||!slot) return;
            const st=data[key]?.[name];

            av.className='inst-avatar'; slot.className='inst-slot';

            // Safe color fallback
            const instructorColor = COLORS[name] || '#A0A0AB';

            if(st==='available'){
                av.classList.add('s-available'); slot.classList.add('s-available');
                av.style.color = instructorColor;
            } else if(st==='unavailable'){
                av.classList.add('s-unavailable'); slot.classList.add('s-unavailable');
                av.style.color='';
            } else {
                av.classList.add('s-pending'); slot.classList.add('s-pending');
                av.style.color = '';
            }

            if(name===selectedName) av.classList.add('is-me');
        });
    }

    function refreshButtons(key){
        const btns=document.getElementById(`btns-${key}`);
        const card=document.getElementById(`card-${key}`);
        if(!btns||!card) return;
        const myStatus=data[key]?.[selectedName];
        if(selectedName){
            btns.classList.remove('locked');
            document.getElementById(`yes-${key}`)?.classList.toggle('active',myStatus==='available');
            document.getElementById(`no-${key}`)?.classList.toggle('active', myStatus==='unavailable');
            card.classList.toggle('has-my-status',!!myStatus);
        } else {
            btns.classList.add('locked');
            card.classList.remove('has-my-status');
        }
    }

    function refreshSummary(key){
        const d=data[key]||{};
        let yes=0,no=0,pending=0;
        INSTRUCTORS.forEach(n=>{
            const st=d[n];
            if(st==='available') yes++;
            else if(st==='unavailable') no++;
            else pending++;
        });
        const sg=document.getElementById(`sg-${key}`);
        const sr=document.getElementById(`sr-${key}`);
        const sa=document.getElementById(`sa-${key}`);
        if(sg) sg.textContent=yes;
        if(sr) sr.textContent=no;
        if(sa) sa.textContent=pending>0?`${pending} טרם ענו`:'הכל בסדר ✓';
    }

    // ── Write availability ────────────────────────────────────
    window._mark = async (key, status, btn) => {
        if(!selectedName){toast('בחר שם קודם!','err');return;}

        const yBtn=document.getElementById(`yes-${key}`);
        const nBtn=document.getElementById(`no-${key}`);
        yBtn?.classList.toggle('active',status==='available');
        nBtn?.classList.toggle('active',status==='unavailable');

        const orig=btn.innerHTML;
        btn.innerHTML='<div class="spinner"></div>'; btn.disabled=true;

        // Clean ID for easy querying in Admin
        const docId = `${key.replace(/\//g, '-')}_${selectedName}`;

        try{
            const ref = doc(db, 'availability', docId);
            const existing = await getDoc(ref);
            const wasAssigned = existing.exists() && existing.data().isAssigned === true;

            await setDoc(ref, {
                name: selectedName,
                date: key,
                status: status,
                isAssigned: wasAssigned,
                timestamp: new Date()
            }, { merge: true });
            
            toast(status==='available'
                ?`✓  ${selectedName} פנוי/ה ב-${key}`
                :`✕  ${selectedName} לא פנוי/ה ב-${key}`,'ok');
        } catch(e){
            console.error(e);
            toast('שגיאה בשמירה','err');
            const prev=data[key]?.[selectedName];
            yBtn?.classList.toggle('active',prev==='available');
            nBtn?.classList.toggle('active',prev==='unavailable');
        } finally {
            btn.innerHTML=orig; btn.disabled=false;
        }
    };

    // ── Boot ─────────────────────────────────────────────────
    loadInstructors().finally(() => {
        renderPills();
        renderView();
    });
</script>
</body>
</html>
