<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>זמינות מדריכים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyARhQHRZEaWN-0NyMbWQo416hDaE8uCUOM",
            authDomain: "salsaproject-aadfe.firebaseapp.com",
            projectId: "salsaproject-aadfe",
            storageBucket: "salsaproject-aadfe.firebasestorage.app",
            messagingSenderId: "357758186496",
            appId: "1:357758186496:web:dcb34b95470a68a16654e5"
        };
        const db = getFirestore(initializeApp(firebaseConfig));

        // פונקציה לשליחת הנתונים
        window.submitStatus = async (date, status) => {
            const name = document.getElementById('instructorName').value;
            if(!name) { alert("בבקשה תבחר שם!"); return; }
            
            await addDoc(collection(db, "availability"), { name, date, status, timestamp: new Date() });
            alert(`מעולה ${name}, נרשם שאתה ${status === 'available' ? 'פנוי' : 'לא פנוי'} ל-${date}`);
        };
    </script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-xl font-bold mb-4">דיווח זמינות - סלסה</h1>
        <select id="instructorName" class="w-full p-2 border rounded mb-6">
            <option value="">מי המדריך?</option>
            <option>משה</option><option>רובי</option><option>גפן</option><option>נטע</option>
        </select>

        <div class="space-y-4">
            <div class="p-3 border rounded flex justify-between items-center">
                <span>יום חמישי 07/05</span>
                <div class="space-x-2 space-x-reverse">
                    <button onclick="submitStatus('07/05', 'available')" class="bg-green-500 text-white px-3 py-1 rounded text-sm">פנוי</button>
                    <button onclick="submitStatus('07/05', 'unavailable')" class="bg-red-500 text-white px-3 py-1 rounded text-sm">לא</button>
                </div>
            </div>
            </div>
    </div>
</body>
</html>
